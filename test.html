<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>データ確認テスト</title>
</head>
<body>
<h2>Sheetsデータ確認</h2>
<button onclick="loadData()">データを読み込む</button>
<pre id="result" style="background:#f0f0f0;padding:1rem;margin-top:1rem;white-space:pre-wrap;">ここに結果が表示されます</pre>
<script>
var SHEETS_URL = "https://script.google.com/macros/s/AKfycbyQIYCmERICSlRSEJDHnq6-sd6IajdykqR-9AOSWrVDWuZc2PlEGyO4f2QMZ99D3jaUFQ/exec";
function loadData(){
  document.getElementById("result").textContent = "読み込み中...";
  var old = document.getElementById("__ts");
  if(old) old.parentNode.removeChild(old);
  window.__twinkleCB = function(data){
    var result = "=== 受信成功 ===
";
    result += "monthData件数: " + (data.monthData ? data.monthData.length : 0) + "
";
    result += "dayData件数: " + (data.dayData ? data.dayData.length : 0) + "

";
    if(data.dayData){
      data.dayData.forEach(function(d){
        result += "日付: " + d.date + "
";
        d.sessions.forEach(function(s){
          result += "  " + s.start + " 〜 " + s.end + "
";
          var sm = t2m(s.start), em = t2m(s.end);
          result += "  分換算: " + sm + " 〜 " + em + " (" + (em-sm) + "分)
";
        });
      });
    }
    document.getElementById("result").textContent = result;
  };
  var sc = document.createElement("script");
  sc.id = "__ts";
  sc.src = SHEETS_URL + "?callback=__twinkleCB&t=" + Date.now();
  sc.onerror = function(){ document.getElementById("result").textContent = "読み込み失敗"; };
  document.head.appendChild(sc);
}
function t2m(t){
  if(!t) return 0;
  t = String(t).trim();
  if(t.indexOf(":") === -1) return 0;
  var p = t.split(":");
  return parseInt(p[0])*60 + parseInt(p[1]);
}
</script>
</body>
</html>
